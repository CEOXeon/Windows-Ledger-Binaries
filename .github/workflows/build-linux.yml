name: Build Windows Ledger (Linux cross-compile)

# Run on manual trigger or automatically on this PR branch to allow pre-merge testing.
on:
  workflow_dispatch:
  push:
    branches:
      - 'copilot/**'

env:
  # All cross-compiled deps are installed here so cmake can find them
  # via CMAKE_PREFIX_PATH in the MinGW toolchain file.
  DEPS: /opt/win-deps

  # Pinned versions for reproducible builds
  GMP_VERSION: "6.3.0"
  MPFR_VERSION: "4.2.1"
  BOOST_VERSION: "1.86.0"
  BOOST_VERSION_UNDERSCORE: "1_86_0"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # ---------------------------------------------------------------
      # 1. Check out only the ledger submodule – mpir/mpfr/boost are no
      #    longer needed because we build the real upstream packages
      #    for the Windows target here on Linux.
      # ---------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 0

      - name: Checkout ledger submodule
        run: git submodule update --init ledger

      # ---------------------------------------------------------------
      # 2. Install MinGW-w64 cross-compilation toolchain
      # ---------------------------------------------------------------
      - name: Install cross-compilation toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            mingw-w64 \
            cmake \
            build-essential \
            wget \
            xz-utils

      - name: Prepare deps directory
        run: sudo install -d -m 777 "$DEPS"

      # ---------------------------------------------------------------
      # 3. Build GMP for Windows x64 (replaces the mpir submodule)
      # ---------------------------------------------------------------
      - name: Build GMP for Windows x64
        working-directory: /tmp
        run: |
          wget "https://gmplib.org/download/gmp/gmp-${GMP_VERSION}.tar.xz"
          tar xf "gmp-${GMP_VERSION}.tar.xz"
          cd "gmp-${GMP_VERSION}"
          ./configure \
            --host=x86_64-w64-mingw32 \
            --prefix="$DEPS" \
            --enable-static \
            --disable-shared \
            --enable-cxx
          make -j"$(nproc)"
          make install

      # ---------------------------------------------------------------
      # 4. Build MPFR for Windows x64 (replaces the mpfr submodule)
      # ---------------------------------------------------------------
      - name: Build MPFR for Windows x64
        working-directory: /tmp
        run: |
          wget "https://ftp.gnu.org/gnu/mpfr/mpfr-${MPFR_VERSION}.tar.xz"
          tar xf "mpfr-${MPFR_VERSION}.tar.xz"
          cd "mpfr-${MPFR_VERSION}"
          ./configure \
            --host=x86_64-w64-mingw32 \
            --prefix="$DEPS" \
            --enable-static \
            --disable-shared \
            --with-gmp="$DEPS"
          make -j"$(nproc)"
          make install

      # ---------------------------------------------------------------
      # 5. Build Boost for Windows x64 (replaces the boost submodule)
      #
      #    We build only the components that ledger needs:
      #      date_time, filesystem, iostreams, regex, system,
      #      unit_test_framework, nowide
      #    iostreams is built without zlib/bzip2 to avoid extra deps.
      # ---------------------------------------------------------------
      - name: Build Boost for Windows x64
        working-directory: /tmp
        run: |
          wget "https://archives.boost.io/release/${BOOST_VERSION}/source/boost_${BOOST_VERSION_UNDERSCORE}.tar.gz"
          tar xf "boost_${BOOST_VERSION_UNDERSCORE}.tar.gz"
          cd "boost_${BOOST_VERSION_UNDERSCORE}"

          ./bootstrap.sh

          # Tell b2 about our MinGW cross-compiler
          cat > user-config.jam << 'EOF'
          using gcc : mingw : x86_64-w64-mingw32-g++ :
            <rc>x86_64-w64-mingw32-windres
            <archiver>x86_64-w64-mingw32-ar
            <ranlib>x86_64-w64-mingw32-ranlib
          ;
          EOF

          ./b2 \
            --user-config=user-config.jam \
            toolset=gcc-mingw \
            target-os=windows \
            link=static \
            runtime-link=static \
            threading=multi \
            address-model=64 \
            variant=release \
            -sNO_ZLIB=1 \
            -sNO_BZIP2=1 \
            --with-date_time \
            --with-filesystem \
            --with-iostreams \
            --with-regex \
            --with-system \
            --with-test \
            --with-nowide \
            --prefix="$DEPS" \
            install \
            -j"$(nproc)"

      # ---------------------------------------------------------------
      # 6. Create a cmake toolchain file for MinGW cross-compilation.
      #    The find-root-path modes restrict cmake to search only inside
      #    the cross-compiled deps prefix and the MinGW sysroot, keeping
      #    it from accidentally picking up host libraries.
      #    CMAKE_PREFIX_PATH is passed explicitly on the cmake command
      #    line (step 7) rather than here to avoid bash heredoc expansion
      #    issues.
      # ---------------------------------------------------------------
      - name: Create MinGW cmake toolchain file
        run: |
          # Use an unquoted heredoc so bash expands ${DEPS} → /opt/win-deps.
          # (cmake's $ENV{} syntax cannot be used here because the heredoc is
          #  processed by bash, which would expand $ENV to empty string.)
          cat > /tmp/mingw-toolchain.cmake << EOF
          set(CMAKE_SYSTEM_NAME Windows)
          set(CMAKE_SYSTEM_PROCESSOR x86_64)

          set(CMAKE_C_COMPILER   x86_64-w64-mingw32-gcc)
          set(CMAKE_CXX_COMPILER x86_64-w64-mingw32-g++)
          set(CMAKE_RC_COMPILER  x86_64-w64-mingw32-windres)

          # Tell cmake to search only inside the cross-compiled deps prefix
          # (and the MinGW sysroot) for headers and libraries, not the host.
          set(CMAKE_FIND_ROOT_PATH /usr/x86_64-w64-mingw32 ${DEPS})
          set(CMAKE_FIND_ROOT_PATH_MODE_PROGRAM NEVER)
          set(CMAKE_FIND_ROOT_PATH_MODE_LIBRARY ONLY)
          set(CMAKE_FIND_ROOT_PATH_MODE_INCLUDE ONLY)
          set(CMAKE_FIND_ROOT_PATH_MODE_PACKAGE ONLY)
          EOF

      # ---------------------------------------------------------------
      # 7. Configure ledger with cmake
      # ---------------------------------------------------------------
      - name: Configure Ledger
        working-directory: ledger
        run: |
          cmake -S . -B build \
            -DCMAKE_TOOLCHAIN_FILE=/tmp/mingw-toolchain.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$DEPS" \
            -DUSE_PYTHON=OFF \
            -DBUILD_LIBRARY=OFF \
            -DBUILD_DOCS=OFF \
            -DBoost_USE_STATIC_LIBS=ON \
            -DBoost_USE_STATIC_RUNTIME=ON \
            -DCMAKE_EXE_LINKER_FLAGS="-static-libgcc -static-libstdc++"

      # ---------------------------------------------------------------
      # 8. Build
      # ---------------------------------------------------------------
      - name: Build Ledger
        working-directory: ledger
        run: cmake --build build --target ledger -j"$(nproc)"

      # ---------------------------------------------------------------
      # 9. Stage the output binary at the repo root for upload.
      #    CMakeLists.txt sets CMAKE_RUNTIME_OUTPUT_DIRECTORY to
      #    PROJECT_BINARY_DIR, so the exe lands in ledger/build/.
      # ---------------------------------------------------------------
      - name: Stage ledger.exe
        run: |
          EXE="ledger/build/ledger.exe"
          if [ ! -f "$EXE" ]; then
            echo "ERROR: $EXE not found after build"
            exit 1
          fi
          echo "Found binary: $EXE"
          file "$EXE"
          cp "$EXE" ledger.exe

      # ---------------------------------------------------------------
      # 10. Upload artifact
      # ---------------------------------------------------------------
      - name: Upload Ledger Windows binary
        uses: actions/upload-artifact@v4
        with:
          name: Ledger-Windows-x64
          path: ledger.exe
